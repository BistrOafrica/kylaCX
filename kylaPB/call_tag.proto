syntax="proto3";

package da.proto;
option go_package = "./pb";

message CallSubTag {
  string id = 1;
  string name = 2;
  string description = 3;
}

message CallTag {
  string id = 1;
  string name = 2;
  string description = 3;
  string created_at = 4;
  repeated CallSubTag sub_tags = 5;
}

message CreateCallTagRequest {
  string name = 1;
  string description = 2;
  repeated CallSubTag sub_tags = 3;
}

message UpdateCallTagRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated CallSubTag sub_tags = 4;
}
message ReadCallTagRequest {
  string id = 1;
}

message SuccessCallTagResponse {
  bool success = 1;
}

message ReadCallTagsRequest {
  int32 page_number = 1;
  int32 page_size = 2;
}

message ReadCallTagsResponse {
  int64 total = 1;
  repeated CallTag items = 2;
}

service CallTagService {
  rpc CreateTag(CreateCallTagRequest) returns (SuccessCallTagResponse);
  rpc ReadTag(ReadCallTagRequest) returns (CallTag);
  rpc UpdateTag(UpdateCallTagRequest) returns (SuccessCallTagResponse);
  rpc DeleteTag(ReadCallTagRequest) returns (SuccessCallTagResponse);
  rpc ReadTags(ReadCallTagsRequest) returns (ReadCallTagsResponse);
}