syntax = "proto3";

package da.proto;

option go_package = "./pb";

message Event {
  string id = 1;
  string title = 2;
  string note = 3;
  string start_date = 4;
  string end_date = 5;
  string scope = 6;
  string location = 7;
  string conferencing = 8;
}

message CreateEventRequest {
  Event event = 1;
}

message CreateEventResponse {
  Event event = 1;
}

message ReadEventRequest {
  string id = 1;
}

message ReadEventResponse {
  Event event = 1;
}

message UpdateEventRequest {
  Event event = 1;
}

message UpdateEventResponse { 
  Event event = 1; 
}

message ReadEventsRequest {
  int64 page = 1;
  int64 per_page = 2;
}

message ReadEventsResponse {
  repeated Event events = 1;
}

message DeleteEventRequest { string id = 1; }

message DeleteEventResponse { string id = 1; }

service EventService {
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc ReadEvent(ReadEventRequest) returns (ReadEventResponse);
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
  rpc ReadEvents(ReadEventsRequest) returns (ReadEventsResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
}