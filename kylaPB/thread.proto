syntax = "proto3";

package da.proto;
option go_package = "./pb";

import "attachment.proto";

enum SenderType {
    SENDER_TYPE_UNSPECIFIED = 0;
    SENDER_TYPE_AGENT = 1;
    SENDER_TYPE_CONTACT = 2;
    SENDER_TYPE_SYSTEM = 3;
  }

enum ThreadStatus {
    THREAD_STATUS_UNSPECIFIED = 0;
    UNSENT = 1;
	SENT = 2;
    FAILED = 3;
}

message Thread {
    string id = 1;
    string ticket_id = 2;
	SenderType sender_type = 3;
	string message = 4;
    string alternate_message = 5;
    string contact_id = 6;
	string agent_id = 7;
    string source_id = 8;
    string integration_id = 9;
	bool opened = 10;
    ThreadStatus status = 11;
    bool delivered = 12;
    bool read = 13;
    string external_id = 14;
    string created_at = 15;
    string updated_at = 16;
    double sentiment_score = 17;
    map<string, string> email_details = 18;
    map<string, string> facebook_details = 19;
    map<string, string> sms_details = 20;
    repeated Attachment attachments = 21;
    string contact_name = 22;
    string agent_name = 23;
    map<string, string> instagram_details = 24;
}

message CreateThreadRequest {
    Thread data = 1;
}

message CreateThreadResponse {
    Thread data = 1;
}

message ReadTicketThreadsRequest {
    string ticket_id = 1;
}

message ReadTicketThreadsResponse {
    repeated Thread data = 1;
}

service ThreadService {
    rpc CreateThread(CreateThreadRequest) returns (CreateThreadResponse);
    rpc ReadTicketThreads(ReadTicketThreadsRequest) returns (ReadTicketThreadsResponse);
}