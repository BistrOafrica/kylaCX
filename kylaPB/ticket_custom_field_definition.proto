syntax = "proto3";

package da.proto;
option go_package = "./pb";
import "owner_type.proto";

message TicketCustomFieldDefinition {
    string id = 1;
    string name = 2;
    string type = 3;
    string icon = 4;
    string created_by = 5;
    string created_at = 6;
    string updated_at = 7;
    string owner_id = 8;
    OwnerType owner_type = 9;
    repeated string options = 10;
}

message CreateTicketCustomFieldDefinitionRequest {
    TicketCustomFieldDefinition data = 1;
}
  
message CreateTicketCustomFieldDefinitionResponse {
    TicketCustomFieldDefinition data = 1;
}

message ReadTicketCustomFieldDefinitionsRequest {
    string owner_id = 1;
    OwnerType owner_type = 2;
}

message ReadTicketCustomFieldDefinitionsResponse {
  int32 total_count = 1;
  repeated TicketCustomFieldDefinition data = 2;
}

message UpdateTicketCustomFieldDefinitionRequest {
    TicketCustomFieldDefinition data = 1;
}
  
  message UpdateTicketCustomFieldDefinitionResponse {
    TicketCustomFieldDefinition data = 1;
}

message DeleteTicketCustomFieldDefinitionRequest {
    string id = 1;
}

message DeleteTicketCustomFieldDefinitionResponse {
    bool success = 1;
}

service TicketCustomFieldDefinitionService {
    rpc CreateTicketCustomFieldDefinition(CreateTicketCustomFieldDefinitionRequest) returns (CreateTicketCustomFieldDefinitionResponse){}
    rpc ReadTicketCustomFieldDefinitions(ReadTicketCustomFieldDefinitionsRequest) returns (ReadTicketCustomFieldDefinitionsResponse){}
    rpc UpdateTicketCustomFieldDefinition(UpdateTicketCustomFieldDefinitionRequest) returns(UpdateTicketCustomFieldDefinitionResponse){}
    rpc DeleteTicketCustomFieldDefinition(DeleteTicketCustomFieldDefinitionRequest) returns(DeleteTicketCustomFieldDefinitionResponse){}
}