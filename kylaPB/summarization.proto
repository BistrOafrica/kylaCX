syntax="proto3";

package da.proto;

option go_package = "./pb";

message TextSummaryRequest {
    string text = 1;
    string min_sentences = 3;
    string max_sentences = 4;
}

message TextSummaryResponse {
    string id = 1;
    string status = 2;
    string created_on = 4;
}

message TextSummary {
    string id = 1;
    string summary_text = 2;
    string status = 3;
    string created_on = 4;
    string completed_on = 5;
}

message TextSummaryNotification {
    string id = 1;
    string status = 2;
    string created_on = 3;
}

message RetrieveTextSummaryRequest {
    string id = 1;
}

message RetrieveTextSummaryResponse {
    oneof response {
        TextSummary text_summary = 1;
        TextSummaryNotification notification = 2;
    }
}

message Conversation {
    string id = 1;
    string text = 2;
    string role = 3;
    string participant_id = 4;
}

message ConversationSummaryRequest {
    repeated Conversation conversation_items = 1;
}

message ConversationSummaryResponse {
    string id = 1;
    string status = 2;
    string name = 3;
    string created_on = 4;
}

message ConversationSummaryItem {
    string aspect = 1;
    string text = 2;
}

message ConversationSummary {
    string id = 1;
    string status = 2;
    string created_on = 3;
    string completed_on = 4;
    repeated string ConversationSummaryItem = 5;
}

message RetrieveConversationSummaryRequest {
    string id = 1;
}

message RetrieveConversationSummaryResponse {
    ConversationSummary conversation_summary = 1;
}

service Summarization {
    rpc CreateTextSummary(TextSummaryRequest) returns (TextSummaryResponse) {}
    rpc ReadTextSummary(RetrieveTextSummaryRequest) returns (RetrieveTextSummaryResponse) {}
    rpc CreateConversationSummary(ConversationSummaryRequest) returns (ConversationSummaryResponse) {}
    rpc ReadConversationSummary(RetrieveConversationSummaryRequest) returns (RetrieveConversationSummaryResponse) {}
}
