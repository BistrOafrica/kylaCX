syntax = "proto3";

package da.proto;
option go_package = "./pb";

enum TicketScriptType {
    TICKET_SCRIPT_TYPE_UNSPECIFIED = 0;
    PLAINTEXT = 1;
    HTML = 2;
  }

message TicketScript {
    string id = 1;
    string name = 2;
    string message = 3;
    string macro_id = 4;
    string created_at = 5;
    string updated_at = 6;
    string created_by = 7;
    TicketScriptType script_type = 8;
}

message CreateTicketScriptRequest {
   TicketScript data = 1;
}

message CreateTicketScriptResponse {
   TicketScript data = 1;
}

message ReadTicketScriptRequest {
   string id = 1;
}

message ReadTicketScriptResponse {
   TicketScript data = 1;
}

message UpdateTicketScriptRequest {
   TicketScript data = 1;
}

message UpdateTicketScriptResponse {
   TicketScript data = 1;
}

message DeleteTicketScriptRequest {
   string id = 1;
}

message DeleteTicketScriptResponse {
   bool success =1;
}

message ReadTicketScriptsRequest {
    int32 page = 1;
    int32 per_page = 2;
    string macro_id = 3;
}

message ReadTicketScriptsResponse {
   int32 total_count = 1;
   repeated TicketScript data = 2;
}

service TicketScriptService {
   rpc CreateTicketScript(CreateTicketScriptRequest) returns (CreateTicketScriptResponse);
   rpc ReadTicketScript(ReadTicketScriptRequest) returns (ReadTicketScriptResponse);
   rpc UpdateTicketScript(UpdateTicketScriptRequest) returns (UpdateTicketScriptResponse);
   rpc DeleteTicketScript(DeleteTicketScriptRequest) returns (DeleteTicketScriptResponse);
   rpc ReadTicketScripts(ReadTicketScriptsRequest) returns (ReadTicketScriptsResponse);
}