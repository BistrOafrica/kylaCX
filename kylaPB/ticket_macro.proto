syntax = "proto3";

package da.proto;
option go_package = "./pb";

import "ticket_script.proto";
import "owner_type.proto";

message TicketMacro {
    string id = 1;
    string name = 2;
    string description = 3;
    string notes = 4;
    string created_at = 5;
    string updated_at = 6;
    string created_by = 7;
    repeated TicketScript scripts = 8;
    string owner_id = 9;
    OwnerType owner_type = 10;
}

message CreateTicketMacroRequest {
   TicketMacro data = 1;
}

message CreateTicketMacroResponse {
   TicketMacro data = 1;
}

message ReadTicketMacroRequest {
   string id = 1;
}

message ReadTicketMacroResponse {
   TicketMacro data = 1;
}

message UpdateTicketMacroRequest {
   TicketMacro data = 1;
}

message UpdateTicketMacroResponse {
   TicketMacro data = 1;
}

message DeleteTicketMacroRequest {
   string id = 1;
}

message DeleteTicketMacroResponse {
   bool success =1;
}

message ReadTicketMacrosRequest {
    int32 page = 1;
    int32 per_page = 2;
    string owner_id = 3;
    OwnerType owner_type = 4;
}

message ReadTicketMacrosResponse {
   int32 total_count = 1;
   repeated TicketMacro data = 2;
}

service TicketMacroService {
   rpc CreateTicketMacro(CreateTicketMacroRequest) returns (CreateTicketMacroResponse);
   rpc ReadTicketMacro(ReadTicketMacroRequest) returns (ReadTicketMacroResponse);
   rpc UpdateTicketMacro(UpdateTicketMacroRequest) returns (UpdateTicketMacroResponse);
   rpc DeleteTicketMacro(DeleteTicketMacroRequest) returns (DeleteTicketMacroResponse);
   rpc ReadTicketMacros(ReadTicketMacrosRequest) returns (ReadTicketMacrosResponse);
}