syntax="proto3";

package da.proto;
option go_package = "./pb"; 
import "agents.proto";
import "owner_type.proto";
import "branch.proto";
import "rbac.proto";

message User {
  string id = 1;
  OwnerType owner_type = 2;
  string first_name = 3;
  string last_name = 4;
  string username = 5;
  string email = 6;
  string phone = 8;
  string status = 9;
  string status_code = 12;
  bool otp_enabled = 13;
  bool otp_verified = 14;
  string otp_secret = 15;
  string created_at = 18;
  string created_by = 19;
  bool is_default = 20;
  repeated Branch branches = 21;
  string current_branch_id = 25;
  string current_organisation_id = 27;
  // repeated Organisation organisations = 22;
  // repeated Department departments = 28;
  // repeated Team teams = 30;
  string agent_status_id = 23;
  AgentStatus agent_status = 24;
  repeated Role roles = 26;
  string email_signature = 29;
  string owner_id = 7;
  bool mfa_enabled = 30;
  string mfa_secret = 31;
  repeated string mfa_recovery_codes = 32;
  repeated Passkey passkeys = 33;
  string last_mfa_login = 34;
  string image = 35;
  string calling_code = 36;
  string updated_at = 37;
  string updated_by = 38;
  string last_login = 39;
  string signature = 40;
}

message Passkey {
  string id = 1;
  string user_id = 2;
  bytes credential_id = 3;
  bytes public_key = 4;
  string attestation_type = 5;
  repeated string transport = 6;
  uint32 flags = 7;
  AuthenticatorInfo authenticator = 8;
}

message AuthenticatorInfo {
  string passkey_id = 1;
  bytes aaguid = 2;
  uint32 sign_count = 3;
  bool clone_warning = 4;
  string attachment = 5;
  bool user_verified = 6;
  bool user_present = 7;
}


message CreateUserRequest {
  User user = 1;
  Scope scope = 2;
}

message CreateUserResponse {
  User user = 1;
}

message ReadUserRequest {
  string user = 1;
  Scope scope = 2;
}

message ReadUserResponse {
  User user = 1;
}

message ReadUsersRequest {
  Scope scope = 1;
}

message ReadUsersResponse {
  repeated User users = 1;
  Status status = 2;
}

message UpdateUserRequest{
  User user =1;
  Scope scope = 2;
}

message UpdateUserResponse{
  User user =1;
}

message DeleteUserRequest{
  string id =1;
  Scope scope = 2;
}

message DeleteUserResponse{
  bool success =1;
}


message ReadAllUsersWithoutTokenRequest {
  Scope scope = 2;
}

message ReadAllUsersWithoutTokenResponse {
  repeated User users = 1;
  Status status = 2;
}

message RoleToUserRequest {
  string user_id = 1;
  string role_id = 2;
  Scope scope = 3;
}

message RoleToUserResponse {
  User user = 1;
}

message UsersToRoleRequest {
  string role_id = 1;
  repeated string user_ids = 2;
  Scope scope = 3;
}

message UsersToRoleResponse {
  Status status = 1;
}

message DeactivateUserRequest {
  string user_id = 1;
  Scope scope = 2;
}

message DeactivateUserResponse {
  Status status = 1;
}

message ActivateUserRequest {
  string user_id = 1;
  Scope scope = 2;
}

message ActivateUserResponse {
  Status status = 1;
}

message ActivateUserAccountRequest{
  string username = 1;
  string password = 2;
}

message ActivateUserAccountResponse{
  Status status = 1;
}

message SearchUsersRequest {
  string query = 1;
  int32 page = 2;
  int32 per_page = 3;
  Scope scope = 4;
}

message SearchUsersResponse {
  repeated User users = 1;
  int32 count = 2;
}

message ReadUsersByPermissionRequest{
  string code_name =1;
  string organisation_id =2;
  Scope scope = 3;
}

message ReadUsersByPermissionResponse{
  repeated User users =1;
}

message ReadUsersByIdsFromServiceRequest {
  repeated string user_ids = 1;
}

message ReadUsersByIdsFromServiceResponse {
  repeated User users = 1;
}


message SignUpRequest {
  string email = 1;
  string first_name = 2;
  string last_name = 3;
  string username = 4;
  string phone = 5;
  string referral_code = 6;
  bool terms = 7;
}

message SignUpResponse {
  string user_id = 1;
  Status status = 2;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc ReadUser(ReadUserRequest) returns (ReadUserResponse) {}
  rpc ReadUsers(ReadUsersRequest) returns (ReadUsersResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {}
  rpc DeactivateUser(DeactivateUserRequest) returns (DeactivateUserResponse) {}
  rpc ActivateUser(ActivateUserRequest) returns (ActivateUserResponse) {}
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {}
  rpc ReadAllUsersWithoutToken(ReadAllUsersWithoutTokenRequest) returns (ReadAllUsersWithoutTokenResponse) {}
  rpc AddRoleToUser(RoleToUserRequest) returns (RoleToUserResponse) {}
  rpc RemoveRoleFromUser(RoleToUserRequest) returns (RoleToUserResponse) {}
  rpc AddUsersToRole(UsersToRoleRequest) returns (UsersToRoleResponse) {}
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse) {}
  rpc ReadUsersByPermission(ReadUsersByPermissionRequest) returns (ReadUsersByPermissionResponse) {}
  rpc ReadByIdsFromService(ReadUsersByIdsFromServiceRequest) returns (ReadUsersByIdsFromServiceResponse) {}

  //Activate User Account
  rpc ActivateUserAccount(ActivateUserAccountRequest) returns (ActivateUserAccountResponse) {}

  //SignUP
  rpc SignUp(SignUpRequest) returns (SignUpResponse) {}
}