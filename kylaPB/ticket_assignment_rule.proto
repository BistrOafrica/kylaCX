syntax = "proto3";

package da.proto;
option go_package = "./pb";

import "owner_type.proto";

enum Operator {
  OPERATOR_EQUAL = 0;
  OPERATOR_NOT_EQUAL = 1;
  OPERATOR_GREATER_THAN = 2;
  OPERATOR_LESS_THAN = 3;
  OPERATOR_GREATER_THAN_OR_EQUAL = 4;
  OPERATOR_LESS_THAN_OR_EQUAL = 5;
  OPERATOR_IN = 6;
  OPERATOR_NOT_IN = 7;
  OPERATOR_CONTAINS = 8;
  OPERATOR_NOT_CONTAINS = 9;
  OPERATOR_STARTS_WITH = 10;
}

enum AssignmentMethod {
  ASSIGNMENT_METHOD_LEAST_LOAD = 0;
  ASSIGNMENT_METHOD_ROUND_ROBIN = 1;
  ASSIGNMENT_METHOD_RANDOM = 2;
}

message TicketAssignmentPolicy {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
  string owner_id = 4;
  OwnerType owner_type = 5;
  bool assignment_enabled = 6;
  AssignmentMethod assignment_method = 7;
  bool load_balancing_enabled = 8;
  string created_by = 9;
}

message CreateTicketAssignmentPolicyRequest {
  TicketAssignmentPolicy data = 1;
}

message CreateTicketAssignmentPolicyResponse {
  TicketAssignmentPolicy data = 1;
}

message UpdateTicketAssignmentPolicyRequest {
  TicketAssignmentPolicy data = 1;
}

message UpdateTicketAssignmentPolicyResponse {
  TicketAssignmentPolicy data = 1;
}

message ReadTicketAssignmentPolicyRequest {
  string id = 1;
}

message ReadTicketAssignmentPolicyResponse {
  TicketAssignmentPolicy data = 1;
}

message ReadOwnerAssignmentPolicyRequest {
  string owner_id = 1;
  OwnerType owner_type = 2;
}

message ReadOwnerAssignmentPolicyResponse {
  TicketAssignmentPolicy data = 1;
}

message ReadTicketAssignmentPoliciesRequest {
}

message ReadTicketAssignmentPoliciesResponse {
  repeated TicketAssignmentPolicy data = 1;
  int32 count = 2;
}

message DeleteTicketAssignmentPolicyRequest {
  string id = 1;
}

message DeleteTicketAssignmentPolicyResponse {
  bool success = 1;
}

service TicketAssignmentPolicyService {
  rpc CreateTicketAssignmentPolicy(CreateTicketAssignmentPolicyRequest) returns (CreateTicketAssignmentPolicyResponse);
  rpc UpdateTicketAssignmentPolicy(UpdateTicketAssignmentPolicyRequest) returns (UpdateTicketAssignmentPolicyResponse);
  rpc ReadTicketAssignmentPolicy(ReadTicketAssignmentPolicyRequest) returns (ReadTicketAssignmentPolicyResponse);
  rpc ReadTicketAssignmentPolicies(ReadTicketAssignmentPoliciesRequest) returns (ReadTicketAssignmentPoliciesResponse);
  rpc ReadOwnerAssignmentPolicy(ReadOwnerAssignmentPolicyRequest) returns (ReadOwnerAssignmentPolicyResponse);
  rpc DeleteTicketAssignmentPolicy(DeleteTicketAssignmentPolicyRequest) returns (DeleteTicketAssignmentPolicyResponse);
}