  syntax="proto3";

package da.proto;
option go_package = "./pb";

enum ExtensionType {
	AGENT_EXTENSION = 0;
	CUSTOMER_EXTENSION =1;
}

message ExtensionMetadata {
  string sip_server = 1;
  string domain = 2;
  string wss_port = 3;
}

message CallExtension {
	string id = 1;
	string name = 2;
	string number = 3;
	string password = 4;
	string description = 5;
  string domain_id = 6;
  string extension_uuid = 7;
  string agent_id = 8;
  string created_at = 9;
	ExtensionType type = 10;
  ExtensionMetadata metadata = 11;
}

message CreateExtensionRequest {
  string name = 1;
  string number = 2;
  string password = 3;
  string description = 4;
  string domain_id = 5;
  string agent_id = 6;
  ExtensionType type = 7;
}

message UpdateExtensionRequest {
  string id = 1;
  string name = 2;
  string number = 3;
  string password = 4;
  string description = 5;
  string domain_id = 6;
  string agent_id = 7;
  ExtensionType type = 8;
}

message ReadExtensionRequest {
  string id = 1;
}

message SuccessExtensionResponse {
  bool success = 1;
}

message ReadExtensionsRequest {
  int32 page_number = 1;
  int32 page_size = 2;
  string domain_id = 3;
}

message ReadExtensionsResponse {
  int64 total = 1;
  repeated CallExtension items = 2;
}

message ReadByAgentIdRequest {
  string agent_id = 1;
}

service CallExtensionService {
  rpc CreateExtension(CreateExtensionRequest) returns (SuccessExtensionResponse);
  rpc ReadExtension(ReadExtensionRequest) returns (CallExtension);
  rpc ReadByAgentId(ReadByAgentIdRequest) returns (CallExtension);
  rpc UpdateExtension(UpdateExtensionRequest) returns (SuccessExtensionResponse);
  rpc DeleteExtension(ReadExtensionRequest) returns (SuccessExtensionResponse);
  rpc ReadExtensions(ReadExtensionsRequest) returns (ReadExtensionsResponse);
}