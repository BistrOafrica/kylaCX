syntax = "proto3";

package da.proto;
option go_package = "./pb";

import "owner_type.proto";
import "ticket.proto";

// Time range filters
message TimeRange {
    string start_date = 1; // ISO 8601 format
    string end_date = 2;   // ISO 8601 format
}

// Common filters for analytics
message AnalyticsFilters {
    TimeRange time_range = 1;
    repeated string teams = 2;
    repeated string agents = 3;
    repeated string categories = 4;
    repeated Priority priorities = 5;      
    repeated TicketStatus statuses = 6;    
    string owner_id = 7;
    OwnerType owner_type = 8;
    bool include_spam = 9; // If true, includes spam tickets in analytics. Default false for data accuracy
}

// KPI Metrics
message KPIMetrics {
    int32 total_tickets = 1;
    double first_contact_resolution_percent = 2;
    double sla_compliance_percent = 3;
    double average_sentiment_score = 4;  // Average sentiment analysis score from ticket messages
    int32 average_resolution_time_minutes = 5;
}

// Ticket volume trends
message TicketVolumePoint {
    string date = 1;
    int32 new_tickets = 2;
}

message TicketVolumeResponse {
    repeated TicketVolumePoint data_points = 1;
}

// Channel distribution
message ChannelMetrics {
    string channel = 1;
    int32 ticket_count = 2;
    double percentage = 3;
}

message ChannelDistributionResponse {
    repeated ChannelMetrics channels = 1;
}

// Integration distribution
message IntegrationMetrics {
    string integration_id = 1;
    string integration_name = 2;
    string channel = 3;              // Source type (Email, WhatsApp, etc.)
    int32 ticket_count = 4;
    double percentage = 5;
}

message IntegrationDistributionResponse {
    repeated IntegrationMetrics integrations = 1;
}

// Agent performance
message AgentPerformance {
    string agent_id = 1;
    string agent_name = 2;
    int32 tickets_handled = 3;
    double avg_resolution_time_minutes = 4;
    double avg_sentiment_score = 5;
    int32 sla_breaches = 6;
    double fcr_percentage = 7;
    int32 total_threads = 8;
    double productivity_score = 9;  // Calculated metric
}

message AgentPerformanceResponse {
    repeated AgentPerformance agents = 1;
    int32 total_count = 2;
}

// SLA Analytics
message SLAMetrics {
    string metric_type = 1;              // FIRST_REPLY_TIME, RESOLUTION_TIME, etc.
    double compliance_percentage = 2;
    int32 total_tickets = 3;
    int32 breached_tickets = 4;
    double avg_time_minutes = 5;
    double target_time_minutes = 6;
}

message SLAComplianceResponse {
    repeated SLAMetrics metrics = 1;
    double overall_compliance = 2;
}

// Time-based activity patterns
message ActivityHeatmapPoint {
    int32 hour = 1;        // 0-23
    int32 day_of_week = 2; // 0-6 (Sunday=0)
    int32 ticket_count = 3;
    string intensity = 4;   // LOW, MEDIUM, HIGH
}

message ActivityHeatmapResponse {
    repeated ActivityHeatmapPoint data_points = 1;
}

// Resolution time analytics
message ResolutionTimeMetrics {
    string channel = 1;
    double avg_resolution_time_minutes = 2;
    double median_resolution_time_minutes = 3;
    int32 total_resolved_tickets = 4;
}

message ResolutionTimeResponse {
    repeated ResolutionTimeMetrics by_channel = 1;
    double overall_avg_minutes = 2;
}

// Ticket status distribution
message StatusDistribution {
    string status = 1;
    int32 count = 2;
    double percentage = 3;
}

message StatusDistributionResponse {
    repeated StatusDistribution statuses = 1;
}

// Priority distribution
message PriorityDistribution {
    string priority = 1;
    int32 count = 2;
    double percentage = 3;
}

message PriorityDistributionResponse {
    repeated PriorityDistribution priorities = 1;
}

// Escalation analytics
message EscalationMetrics {
    int32 total_escalations = 1;
    double escalation_rate = 2;          // Percentage of tickets escalated
    double avg_escalation_time_minutes = 3;
    repeated string top_escalation_reasons = 4;
}

// Live ticket tracking
message LiveTicket {
    string ticket_id = 1;
    string serial_number = 2;
    string customer_name = 3;
    string channel = 4;
    string priority = 5;
    string sla_status = 6;
    string assigned_agent = 7;
    double minutes_since_created = 8;
    double minutes_until_sla_breach = 9;
}

message LiveTicketTrackingResponse {
    repeated LiveTicket tickets = 1;
    int32 total_count = 2;
}

// Trend analysis
message TrendPoint {
    string period = 1;     // Date/week/month identifier
    double value = 2;
    double change_percent = 3;  // Change from previous period
}

message TrendAnalysisResponse {
    repeated TrendPoint data_points = 1;
    string trend_direction = 2;  // INCREASING, DECREASING, STABLE
}

// Sentiment analytics
message SentimentDistribution {
    string sentiment_range = 1;  // "Very Negative", "Negative", "Neutral", "Positive", "Very Positive"
    int32 ticket_count = 2;
    double percentage = 3;
    double avg_score = 4;        // Average sentiment score in this range
}

message SentimentAnalyticsResponse {
    repeated SentimentDistribution distribution = 1;
    double overall_avg_sentiment = 2;
    int32 total_tickets_analyzed = 3;
    SentimentDistribution most_common_sentiment = 4;
}

// Request messages
message GetKPIMetricsRequest {
    AnalyticsFilters filters = 1;
}

message GetTicketVolumeRequest {
    AnalyticsFilters filters = 1;
    string granularity = 2;  // DAILY, WEEKLY, MONTHLY
}

message GetChannelDistributionRequest {
    AnalyticsFilters filters = 1;
}

message GetIntegrationDistributionRequest {
    AnalyticsFilters filters = 1;
}

message GetAgentPerformanceRequest {
    AnalyticsFilters filters = 1;
    int32 page = 2;
    int32 per_page = 3;
    string sort_by = 4;      // tickets_handled, avg_resolution_time, etc.
    string sort_order = 5;   // ASC, DESC
}

message GetSLAComplianceRequest {
    AnalyticsFilters filters = 1;
    repeated string metric_types = 2;  // Filter specific SLA metrics
}

message GetActivityHeatmapRequest {
    AnalyticsFilters filters = 1;
    string time_zone = 2; // Optional IANA timezone name (e.g., "America/New_York"); defaults to UTC when omitted
}

message GetResolutionTimeAnalyticsRequest {
    AnalyticsFilters filters = 1;
}

message GetStatusDistributionRequest {
    AnalyticsFilters filters = 1;
}

message GetPriorityDistributionRequest {
    AnalyticsFilters filters = 1;
}

message GetEscalationMetricsRequest {
    AnalyticsFilters filters = 1;
}

message GetLiveTicketTrackingRequest {
    AnalyticsFilters filters = 1;
    int32 page = 2;
    int32 per_page = 3;
    string sort_by = 4;      // sla_urgency, created_at, etc.
}

message GetTrendAnalysisRequest {
    AnalyticsFilters filters = 1;
    string metric = 2;       // resolution_time, ticket_volume, sla_compliance
    string granularity = 3;  // DAILY, WEEKLY, MONTHLY
}

message GetSentimentAnalyticsRequest {
    AnalyticsFilters filters = 1;
}

// Response wrapper for error handling
message AnalyticsResponse {
    bool success = 1;
    string message = 2;
    oneof data {
        KPIMetrics kpi_metrics = 3;
        TicketVolumeResponse ticket_volume = 4;
        ChannelDistributionResponse channel_distribution = 5;
        IntegrationDistributionResponse integration_distribution = 6;
        AgentPerformanceResponse agent_performance = 7;
        SLAComplianceResponse sla_compliance = 8;
        ActivityHeatmapResponse activity_heatmap = 9;
        ResolutionTimeResponse resolution_time = 10;
        StatusDistributionResponse status_distribution = 11;
        PriorityDistributionResponse priority_distribution = 12;
        EscalationMetrics escalation_metrics = 13;
        LiveTicketTrackingResponse live_tracking = 14;
        TrendAnalysisResponse trend_analysis = 15;
        SentimentAnalyticsResponse sentiment_analytics = 16;
    }
}

// Analytics service definition
service TicketAnalyticsService {
    // Core KPI metrics
    rpc GetKPIMetrics(GetKPIMetricsRequest) returns (KPIMetrics);
    
    // Ticket analytics
    rpc GetTicketVolume(GetTicketVolumeRequest) returns (TicketVolumeResponse);
    rpc GetChannelDistribution(GetChannelDistributionRequest) returns (ChannelDistributionResponse);
    rpc GetIntegrationDistribution(GetIntegrationDistributionRequest) returns (IntegrationDistributionResponse);
    rpc GetStatusDistribution(GetStatusDistributionRequest) returns (StatusDistributionResponse);
    rpc GetPriorityDistribution(GetPriorityDistributionRequest) returns (PriorityDistributionResponse);
    
    // Agent analytics
    rpc GetAgentPerformance(GetAgentPerformanceRequest) returns (AgentPerformanceResponse);
    
    // SLA analytics
    rpc GetSLACompliance(GetSLAComplianceRequest) returns (SLAComplianceResponse);
    
    // Time-based analytics
    rpc GetActivityHeatmap(GetActivityHeatmapRequest) returns (ActivityHeatmapResponse);
    rpc GetResolutionTimeAnalytics(GetResolutionTimeAnalyticsRequest) returns (ResolutionTimeResponse);
    
    // Operational analytics
    rpc GetEscalationMetrics(GetEscalationMetricsRequest) returns (EscalationMetrics);
    rpc GetLiveTicketTracking(GetLiveTicketTrackingRequest) returns (LiveTicketTrackingResponse);
    
    // Trend analysis
    rpc GetTrendAnalysis(GetTrendAnalysisRequest) returns (TrendAnalysisResponse);
    
    // Sentiment analytics
    rpc GetSentimentAnalytics(GetSentimentAnalyticsRequest) returns (SentimentAnalyticsResponse);
}
