syntax = "proto3";

package da.proto;
option go_package = "./pb";
import "owner_type.proto";

message TicketTag {
    string id = 1;
    string name = 2;
    string created_at = 3;
    string updated_at = 4;
    string created_by = 5;
    string color_code = 6;
    string owner_id = 7;
    OwnerType owner_type = 8;
}

message CreateTicketTagRequest {
   TicketTag data = 1;
}

message CreateTicketTagResponse {
   TicketTag data = 1;
}

message ReadTicketTagRequest {
   string id = 1;
}

message ReadTicketTagResponse {
   TicketTag data = 1;
}

message UpdateTicketTagRequest {
   TicketTag data = 1;
}

message UpdateTicketTagResponse {
   TicketTag data = 1;
}

message DeleteTicketTagRequest {
   string id = 1;
}

message DeleteTicketTagResponse {
   bool success =1;
}

message ReadTicketTagsRequest {
   int32 page = 1;
   int32 per_page = 2;
   string owner_id = 3;
   OwnerType owner_type = 4;
}

message ReadTicketTagsResponse {
   int32 total_count = 1;
   repeated TicketTag data = 2;
}

service TicketTagService {
   rpc CreateTicketTag(CreateTicketTagRequest) returns (CreateTicketTagResponse);
   rpc ReadTicketTag(ReadTicketTagRequest) returns (ReadTicketTagResponse);
   rpc UpdateTicketTag(UpdateTicketTagRequest) returns (UpdateTicketTagResponse);
   rpc DeleteTicketTag(DeleteTicketTagRequest) returns (DeleteTicketTagResponse);
   rpc ReadTicketTags(ReadTicketTagsRequest) returns (ReadTicketTagsResponse);
}