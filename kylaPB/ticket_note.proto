syntax = "proto3";

package da.proto;
option go_package = "./pb";

message TicketNote {
    string id = 1;
    string description = 2;
    string ticket_id = 3;
    string created_by = 4;
    string created_at = 5;
    string updated_at = 6;
}

message CreateTicketNoteRequest {
   TicketNote data = 1;
}

message CreateTicketNoteResponse {
   TicketNote data = 1;
}

message ReadTicketNoteRequest {
   string id = 1;
}

message ReadTicketNoteResponse {
   TicketNote data = 1;
}

message UpdateTicketNoteRequest {
   TicketNote data = 1;
}

message UpdateTicketNoteResponse {
   TicketNote data = 1;
}

message DeleteTicketNoteRequest {
   string id = 1;
}

message DeleteTicketNoteResponse {
   bool success =1;
}

message ReadTicketNotesRequest {
   string ticket_id = 1;
}

message ReadTicketNotesResponse {
   repeated TicketNote data = 2;
}

service TicketNoteService {
   rpc CreateTicketNote(CreateTicketNoteRequest) returns (CreateTicketNoteResponse);
   rpc ReadTicketNote(ReadTicketNoteRequest) returns (ReadTicketNoteResponse);
   rpc UpdateTicketNote(UpdateTicketNoteRequest) returns (UpdateTicketNoteResponse);
   rpc DeleteTicketNote(DeleteTicketNoteRequest) returns (DeleteTicketNoteResponse);
   rpc ReadTicketNotes(ReadTicketNotesRequest) returns (ReadTicketNotesResponse);
}