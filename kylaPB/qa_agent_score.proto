syntax="proto3";

package da.proto;

option go_package = "./pb";

enum ScoreField {
  GREETING_AND_PROFESSIONALISM = 0;
  TONE_AND_ATTITUDE = 1;
  COMMUNICATION_CLARITY = 2;
  ACTIVE_LISTENING = 3;
  ISSUE_UNDERSTANDING = 4;
  PROBLEM_RESOLUTION = 5;
  ACCURACY_OF_INFORMATION = 6;
  CALL_CONTROL_AND_EFFICIENCY = 7;
  COMPLIANCE_AND_PRIVACY = 8;
  CLOSING_AND_OVERALL_EXPERIENCE = 9;
}

message AgentScore {
  string id = 1;
  string qa_id = 2;
  int32 greeting_and_professionalism = 3;
  int32 tone_and_attitude = 4;
  int32 communication_clarity = 5;
  int32 active_listening = 6;
  int32 issue_understanding = 7;
  int32 problem_resolution = 8;
  int32 accuracy_of_information = 9;
  int32 call_control_and_efficiency = 10;
  int32 compliance_and_privacy = 11;
  int32 closing_and_overall_experience = 12;
  int32 overall_score = 13;
}

message UpdateAgentScoreRequest {
  string id = 1;
  int32 score = 2;
  string qa_id = 3;
  ScoreField field = 4;
}

message UpdateAgentScoreResponse {
  AgentScore agent_score = 1;
}

message ReadAgentScoreRequest {
  string qa_id = 1;
}

message ReadAgentScoreResponse {
  AgentScore agent_score = 1;
}

service QAAgentScoreService {
  rpc RateAgent(UpdateAgentScoreRequest) returns (UpdateAgentScoreResponse);
  rpc ReadAgentScore(ReadAgentScoreRequest) returns (ReadAgentScoreResponse);
}