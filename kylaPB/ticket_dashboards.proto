syntax = "proto3";

package da.proto;
option go_package = "./pb";

import "owner_type.proto";

// Supported metric types based on actual analytics implementation
enum MetricType {
    METRIC_TYPE_UNSPECIFIED = 0;
    METRIC_TYPE_KPI = 1;                          // KPI Dashboard
    METRIC_TYPE_TICKET_VOLUME = 2;                // Ticket Volume - config: granularity
    METRIC_TYPE_CHANNEL_DISTRIBUTION = 3;         // Channel Distribution
    METRIC_TYPE_INTEGRATION_DISTRIBUTION = 4;     // Integration Distribution
    METRIC_TYPE_AGENT_PERFORMANCE = 5;            // Agent Performance
    METRIC_TYPE_STATUS_DISTRIBUTION = 6;          // Status Distribution
    METRIC_TYPE_PRIORITY_DISTRIBUTION = 7;        // Priority Distribution
    METRIC_TYPE_SLA_COMPLIANCE = 8;               // SLA Compliance
    METRIC_TYPE_ACTIVITY_HEATMAP = 9;             // Activity Heatmap
    METRIC_TYPE_RESOLUTION_TIME_ANALYTICS = 10;   // Resolution Time Analytics
    METRIC_TYPE_ESCALATION_METRICS = 11;          // Escalation Metrics
    METRIC_TYPE_LIVE_TICKET_TRACKING = 12;        // Live Ticket Tracking
    METRIC_TYPE_TREND_ANALYSIS = 13;              // Trend Analysis - config: granularity
    METRIC_TYPE_SENTIMENT_ANALYTICS = 14;         // Sentiment Analytics
}

// Valid granularity options for time-based metrics
enum Granularity {
    GRANULARITY_UNSPECIFIED = 0;
    GRANULARITY_HOURLY = 1;
    GRANULARITY_DAILY = 2;
    GRANULARITY_WEEKLY = 3;
    GRANULARITY_MONTHLY = 4;
}

// Dashboard metric configuration with type safety
message DashboardMetricConfig {
    MetricType metric_type = 1;         // Strongly typed metric type
}

message Dashboard {
    string id = 1;
    string name = 2;
    string description = 3;
    string owner_id = 4;
    OwnerType owner_type = 5;
    repeated DashboardMetricConfig metrics = 6;  // Dynamic list of metrics
    string created_at = 7;                      // ISO 8601 timestamp
    string updated_at = 8;                      // ISO 8601 timestamp
    string created_by = 9;                      // User ID who created
    string last_modified_by = 10;                // User ID who last modified
}

// Dashboard requests
message CreateDashboardRequest {
    Dashboard dashboard = 1; 
}

message UpdateDashboardRequest {
    Dashboard dashboard = 1;
}

message GetDashboardRequest {
    string id = 1;
}

message ListDashboardsRequest {
    int32 page = 1;
    int32 per_page = 2;
    string search = 3;           // Search in name/description
}

message DeleteDashboardRequest {
    string id = 1;
}

message DuplicateDashboardRequest {
    string id = 1;
    string new_name = 2;
    string new_description = 3;
}

// Dashboard responses
message DashboardResponse {
    Dashboard dashboard = 1;
}

message ListDashboardsResponse {
    repeated Dashboard dashboards = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 per_page = 4;
}

message DeleteDashboardResponse {
    bool success = 1;
}

// Configuration requirements for each metric type
message MetricConfigRequirements {
    bool requires_granularity = 1;       // Whether this metric supports/requires granularity config
}

// Available metrics catalog with comprehensive type information
message AvailableMetric {
    MetricType metric_type = 1;                    // Strongly typed metric type
    string name = 2;                               // Display name
    string description = 3;                        // Description for UI
    MetricConfigRequirements config_requirements = 4; // Configuration requirements
    string category = 5;                           // Category for grouping (e.g., "Performance", "Distribution")
}

message GetAvailableMetricsRequest {
}

message GetAvailableMetricsResponse {
    repeated AvailableMetric metrics = 1;
}

// Validation requests and responses
message ValidateDashboardRequest {
    Dashboard dashboard = 1;
}

message ValidateMetricConfigRequest {
    DashboardMetricConfig metric_config = 1;
}

message ValidationError {
    string field = 1;           // Field path (e.g., "metrics[0].size")
    string message = 2;         // Error message
    string error_code = 3;      // Machine-readable error code
}

message ValidateDashboardResponse {
    bool is_valid = 1;
    repeated ValidationError errors = 2;
}

message ValidateMetricConfigResponse {
    bool is_valid = 1;
    repeated ValidationError errors = 2;
    AvailableMetric metric_info = 3;  // Information about the metric for reference
}

// Dashboard management service
service TicketDashboardService {
    // CRUD Operations
    rpc CreateDashboard(CreateDashboardRequest) returns (DashboardResponse);
    rpc GetDashboard(GetDashboardRequest) returns (DashboardResponse);
    rpc UpdateDashboard(UpdateDashboardRequest) returns (DashboardResponse);
    rpc DeleteDashboard(DeleteDashboardRequest) returns (DeleteDashboardResponse);
    rpc ListDashboards(ListDashboardsRequest) returns (ListDashboardsResponse);
    
    // Additional operations
    rpc DuplicateDashboard(DuplicateDashboardRequest) returns (DashboardResponse);
    rpc GetAvailableMetrics(GetAvailableMetricsRequest) returns (GetAvailableMetricsResponse);
    
    // Validation operations
    rpc ValidateDashboard(ValidateDashboardRequest) returns (ValidateDashboardResponse);
    rpc ValidateMetricConfig(ValidateMetricConfigRequest) returns (ValidateMetricConfigResponse);
}