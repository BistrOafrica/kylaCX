syntax = "proto3";

package da.proto;
option go_package = "./pb";

message CallNumber {
	string id = 1;
	string number = 2;
	string server_id = 3;
	string country_code = 4;
	string description = 5;
	string created_at = 6;
}

message CreateNumberRequest {
  string number = 1;
  string server_id = 2;
  string country_code = 3;
  string description = 4;
}

message UpdateNumberRequest {
  string id = 1;
  string number = 2;
  string country_code = 3;
  string description = 4;
}

message ReadNumberRequest {
  string id = 1;
}
message SuccessNumberResponse {
  bool success = 1;
  string id = 2;
}

message ReadNumbersRequest {
  int32 page_number = 1;
  int32 page_size = 2;
  string server_id = 3;
}

message ReadNumbersResponse {
  int64 total = 1;
  repeated CallNumber items = 2;
}

service CallNumberService {
  rpc CreateNumber(CreateNumberRequest) returns (SuccessNumberResponse);
  rpc ReadNumber(ReadNumberRequest) returns (CallNumber);
  rpc UpdateNumber(UpdateNumberRequest) returns (SuccessNumberResponse);
  rpc DeleteNumber(ReadNumberRequest) returns (SuccessNumberResponse);
  rpc ReadNumbers(ReadNumbersRequest) returns (ReadNumbersResponse);
}