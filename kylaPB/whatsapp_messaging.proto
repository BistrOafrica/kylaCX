syntax="proto3";

package da.proto;

option go_package = "./pb";

message WhatsappTextMessage {
    string to = 1;
    string text = 2;
}

message SendWhatsappTextMessageRequest {
    WhatsappTextMessage message = 1;
    string integration_id = 2;
}

message SendWhatsappTextMessageResponse {
    bool success = 1;
    string reason = 2;
    string wa_id = 3;
    string message_id = 4;
}


service WhatsappMessaging {
    rpc SendWhatsappTextMessage(SendWhatsappTextMessageRequest) returns (SendWhatsappTextMessageResponse);
}