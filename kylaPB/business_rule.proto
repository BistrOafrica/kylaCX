syntax="proto3";

package da.proto;
option go_package = "./pb";
import "owner_type.proto";
import "ticket_assignment_rule.proto";


enum LogicOperator {
	AND = 0;
	OR = 1;
}

message RuleAction {
	string type = 1; 
	string value = 2;
}

message RuleCondition {
	string field = 1;
	Operator operator = 2;
	string value = 3;
	LogicOperator logic = 4;
}

message BusinessRule {
	string id = 1;
	string name = 2;
	string trigger = 3;
	repeated RuleCondition conditions = 4;
	repeated RuleAction actions = 5;
	bool enabled = 6;
	string description = 7;
	int32 order_of_priority = 8;
	string owner_id = 9;
	OwnerType owner_type = 10;
}

message CreateBusinessRuleRequest {
	BusinessRule item = 1;
}
  
message CreateBusinessRuleResponse {
	string message = 1;
	BusinessRule item = 2;
}

message ReadBusinessRuleRequest {
	string id = 1;
}
  
message ReadBusinessRuleResponse {
	BusinessRule item = 1;
}
  
message UpdateBusinessRuleRequest {
	BusinessRule item = 1;
}
  
message UpdateBusinessRuleResponse {
	string message = 1;
	BusinessRule item = 2;
}

message DeleteBusinessRuleRequest {
	string id = 1;
}
  
message DeleteBusinessRuleResponse {
	bool success = 1;
	string message = 2;
}
  
message ReadBusinessRulesRequest {
	int32 page = 1;
	int32 limit = 2;
	string owner_id = 3;
	OwnerType owner_type = 4;
}
  
message ReadBusinessRulesResponse {
	repeated BusinessRule items = 1;
	int64 total = 2;
}

service BusinessRuleService {
	rpc CreateBusinessRule(CreateBusinessRuleRequest) returns (CreateBusinessRuleResponse);
	rpc ReadBusinessRule(ReadBusinessRuleRequest) returns (ReadBusinessRuleResponse);
	rpc UpdateBusinessRule(UpdateBusinessRuleRequest) returns (UpdateBusinessRuleResponse);
	rpc SyncBusinessRule(UpdateBusinessRuleRequest) returns (UpdateBusinessRuleResponse);
	rpc DeleteBusinessRule(DeleteBusinessRuleRequest) returns (DeleteBusinessRuleResponse);
	rpc ReadBusinessRules(ReadBusinessRulesRequest) returns (ReadBusinessRulesResponse);
}