syntax="proto3";

package da.proto;

option go_package = "./pb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "owner_type.proto";

// EncryptionService provides end-to-end encryption capabilities
service EncryptionService {
  // Identity Management
  rpc GenerateIdentity(GenerateIdentityRequest) returns (SignalIdentity) {}
  rpc GetPreKeyBundle(GetPreKeyBundleRequest) returns (PreKeyBundle) {}
  rpc RotateKeys(RotateKeysRequest) returns (google.protobuf.Empty) {}
  rpc GetIdentity(GetIdentityRequest) returns (SignalIdentity) {}
  rpc GetAllIdentities(GetAllIdentitiesRequest) returns (GetAllIdentitiesResponse) {}


   // Session management
  rpc CreateSession(CreateSessionRequest) returns (SignalSession);
  rpc GetSession(GetSessionRequest) returns (SignalSession);
  rpc GetSessions(google.protobuf.Empty) returns (GetSessionsResponse);

  // Direct Messaging
  rpc SendMessage(SendMessageRequest) returns (Message) {}
  rpc DecryptMessage(DecryptMessageRequest) returns (DecryptMessageResponse) {}
  rpc ForwardMessage(ForwardChatMessageRequest) returns (Message) {}
  rpc UpdateMessageStatus(UpdateMessageStatusRequest) returns (google.protobuf.Empty) {}

  // Group Messaging
  rpc SendGroupMessage(SendGroupMessageRequest) returns (GroupMessageResponse) {}
  rpc DecryptGroupMessage(DecryptGroupMessageRequest) returns (DecryptMessageResponse) {}

  // Message Management
  rpc AddReaction(AddReactionRequest) returns (google.protobuf.Empty) {}
  rpc AddAttachment(AddAttachmentRequest) returns (google.protobuf.Empty) {}
  rpc UpdateTypingIndicator(UpdateTypingIndicatorRequest) returns (google.protobuf.Empty) {}
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse) {}
  rpc BackupMessages(BackupMessagesRequest) returns (BackupMessagesResponse) {}
  rpc RestoreMessages(RestoreMessagesRequest) returns (google.protobuf.Empty) {}
  rpc EditMessage(EditMessageRequest) returns (google.protobuf.Empty) {}
  rpc PinMessage(PinUpMessageRequest) returns (google.protobuf.Empty) {}
  rpc UnpinMessage(UnPinUpMessageRequest) returns (google.protobuf.Empty) {}

  // Thread Management
  rpc CreateThread(CreateChatThreadRequest) returns (MessageThread) {}
  rpc AddMessageToThread(AddMessageToThreadRequest) returns (google.protobuf.Empty) {}
  rpc ReplyToMessage(ReplyToMessageRequest) returns (Message) {}

  // Message Scheduling and Reminders
  rpc SetMessageReminder(SetMessageReminderRequest) returns (google.protobuf.Empty) {}
  rpc ScheduleMessage(ScheduleMessageRequest) returns (Message) {}

  // Templates
  rpc CreateTemplate(CreateTemplateRequest) returns (MessageTemplate) {}
  rpc SendMessageFromTemplate(SendMessageFromTemplateRequest) returns (Message) {}

  // Categories
  rpc CreateCategory(CreateChatCategoryRequest) returns (MessageCategory) {}
  rpc AssignMessageToCategory(AssignMessageToCategoryRequest) returns (google.protobuf.Empty) {}

  // Archive Management
  rpc ArchiveMessage(ArchiveMessageRequest) returns (google.protobuf.Empty) {}
  rpc UnarchiveMessage(UnarchiveMessageRequest) returns (google.protobuf.Empty) {}
}

// Common Types
message string {
  string value = 1;
}

message SignalIdentity {
  string id = 1;
  string user_id = 2;
  bytes identity = 3;
  bytes pre_key = 4;
  bytes signed_key = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  Scope scope = 8; // Scope can be used to specify the type of identity
  string name = 9;
  string phone_number = 10;
  string email = 11;
  string avatar = 12;
  string username = 13;
}

message PreKeyBundle {
  bytes identity_key = 1;
  bytes pre_key = 2;
  bytes signed_pre_key = 3;
  bytes signature = 4;
}

message Message {
  string id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string group_id = 4;
  string content = 5;
  google.protobuf.Timestamp expires_at = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  bool is_expired = 9;
  bool is_forwarded = 10;
  string forwarded_from = 11;
  bool is_edited = 12;
  bool is_pinned = 13;
  string thread_id = 14;
  string reply_to_id = 15;
  google.protobuf.Timestamp reminder_at = 16;
  bool is_scheduled = 17;
  google.protobuf.Timestamp scheduled_at = 18;
  string template_id = 19;
  bool is_archived = 20;
  google.protobuf.Timestamp archived_at = 21;
  string category_id = 22;
  bool is_pending = 23;
  string status = 24;
  bool is_delivered = 25;
  bool is_read = 26;
  bool is_synced = 27;
  bool is_deleted = 28;
  bool is_reply = 29;
  string session_id = 30;
  // For reply messages
  string reply_to_content = 31;
  string reply_to_sender_id = 32;
  string reply_to_group_id = 33;
  string reply_to_thread_id = 34;
  string reply_to_template_id = 35;
}

enum SignalSessionType {
  UNKNOWN = 0;
  DM = 1;
  GROUP = 2;
  CHANNEL = 3;
  TICKET = 4;
  SERVICE = 5;
}
message SignalSession {
  string id = 1;
  string user_id = 2;
  string peer_id = 3;
  string name = 4;
  Message last_message = 5;
  google.protobuf.Timestamp last_updated = 6;
  string identity_id = 7;
  int32 unread_count = 8;
  bool is_pinned = 9;
  bool is_archived = 10;
  bool is_muted = 11;
  bool is_blocked = 12;
  bool is_favorite = 13;
  string category_id = 14;
  bool is_group = 15;
  bool is_secret = 16;
  bool is_new = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
  string description = 20;
  SignalSessionType type = 21;
  string last_message_id = 22;
}

message CreateSessionRequest {
  string name = 1;
  string peer_id = 2;
  SignalSessionType type = 3;
  string description = 4;
  Scope scope = 5; // Scope can be used to specify the type of session to create
}

message GetSessionRequest {
  string session_id = 1;
  Scope scope = 2; // Scope can be used to specify the type of session to retrieve
}

message GetSessionsResponse {
  repeated SignalSession sessions = 1;
}

// Request/Response Messages
message GenerateIdentityRequest {
  string user_id = 1;
  Scope scope = 2; // Scope can be used to specify the type of identity to generate
}

message GetIdentityRequest {
  string user_id = 1;
  Scope scope = 2; // Scope can be used to specify the type of identity to retrieve
}
message GetAllIdentitiesRequest {
  string user_id = 1;
  Scope scope = 2; // Scope can be used to specify the type of identities to retrieve
}
message GetAllIdentitiesResponse {
  repeated SignalIdentity identities = 1;
}

message GetPreKeyBundleRequest {
  string user_id = 1;
  Scope scope = 2; // Scope can be used to specify the type of pre-key bundle to retrieve
}

message RotateKeysRequest {
  string user_id = 1;
  Scope scope = 2; // Scope can be used to specify the type of keys to rotate
}

message SendMessageRequest {
  string sender_id = 1;
  string receiver_id = 2;
  string content = 3;
  string session_id = 5;
}

message DecryptMessageRequest {
  string sender_id = 1;
  string receiver_id = 2;
  string encrypted_content = 3;
  string session_id = 4;
}

message DecryptMessageResponse {
  string decrypted_content = 1;
}

message ForwardChatMessageRequest {
  string message_id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string session_id = 4;
}

message UpdateMessageStatusRequest {
  string message_id = 1;
  string user_id = 2;
  string status = 3;
}

message SendGroupMessageRequest {
  string sender_id = 1;
  string group_id = 2;
  string content = 3;
  string session_id = 4;
}

message GroupMessageResponse {
  map<string, string> encrypted_messages = 1;
}

message DecryptGroupMessageRequest {
  string sender_id = 1;
  string receiver_id = 2;
  string group_id = 3;
  string encrypted_content = 4;
  string session_id = 5;
}

message AddReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string reaction = 3;
}

message AddAttachmentRequest {
  string message_id = 1;
  string attachment_type = 2;
  string url = 3;
  int64 size = 4;
}

message UpdateTypingIndicatorRequest {
  string user_id = 1;
  string peer_id = 2;
  bool is_typing = 3;
}

message SearchMessagesRequest {
  string user_id = 1;
  string query = 2;
  string session_id = 3;
}

message SearchMessagesResponse {
  repeated Message messages = 1;
}

message BackupMessagesRequest {
  string user_id = 1;
  string session_id = 2;
}

message BackupMessagesResponse {
  repeated Message messages = 1;
}

message RestoreMessagesRequest {
  repeated Message messages = 1;
  string user_id = 2;
}

message EditMessageRequest {
  string message_id = 1;
  string user_id = 2;
  string new_content = 3;
  string session_id = 4;
}

message PinUpMessageRequest {
  string message_id = 1;
  string user_id = 2;
}

message UnPinUpMessageRequest {
  string message_id = 1;
  string user_id = 2;
}

message CreateChatThreadRequest {
  string title = 1;
  string message_id = 2;
  string session_id = 3;
}

message MessageThread {
  string id = 1;
  string title = 2;
    string session_id = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message AddMessageToThreadRequest {
  string message_id = 1;
  string thread_id = 2;
  string user_id = 3;
}

message ReplyToMessageRequest {
  string message_id = 1;
  string user_id = 2;
  string content = 3;
  string session_id = 4;
}

message SetMessageReminderRequest {
  string message_id = 1;
  string user_id = 2;
  google.protobuf.Timestamp reminder_at = 3;
}

message ScheduleMessageRequest {
  string sender_id = 1;
  string receiver_id = 2;
  string content = 3;
  google.protobuf.Timestamp scheduled_at = 4;
  string session_id = 5;
}

message CreateTemplateRequest {
  string user_id = 1;
  string title = 2;
  string content = 3;
}

message MessageTemplate {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message SendMessageFromTemplateRequest {
  string template_id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string session_id = 4;
}

message CreateChatCategoryRequest {
  string user_id = 1;
  string name = 2;
  string color = 3;
}

message MessageCategory {
  string id = 1;
  string user_id = 2;
  string name = 3;
  string color = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message AssignMessageToCategoryRequest {
  string message_id = 1;
  string category_id = 2;
  string user_id = 3;
}

message ArchiveMessageRequest {
  string message_id = 1;
  string user_id = 2;
}

message UnarchiveMessageRequest {
  string message_id = 1;
  string user_id = 2;
} 