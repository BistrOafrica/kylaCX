syntax="proto3";

package da.proto;

option go_package = "./pb";

import "transcription.proto";
import "summarization.proto";



message QueueSessionRequest {
    string url = 1;
    string call_log_id = 2;
}

message QueueSessionResponse {
    string id = 1;
    string transcription_job_id = 2;
    string summary_job_id = 3;
}

message CallSentiment {
    message ClientSentiment {
        string label = 1;
        float score = 2;
    }

    message AgentSentiment {
        string label = 1;
        float score = 2;
    }
}

message QA {
    string id = 1;
    string url = 2;
    string transcription_id = 3;
    string summary_id = 4;
    string sentiment = 5;
    float score = 6;
    string call_log_id = 7;
}

message ReadTranscriptionRequest {
    string id = 1;
}

message ReadTranscriptionResponse {
    RetrieveTranscriptionResponse transcription_response = 1;
}

message ReadSummaryRequest {
    string id = 1;
}

message ReadSummaryResponse {
    RetrieveTextSummaryResponse summary_response = 1;
}

message ReadAllQaRequest {}

message ReadAllQaResponse {
    repeated QA qa = 1;
}

message ReadQARecordRequest {
    string id = 1;
}

message ReadQARecordResponse {
    QA qa = 1;
}

message BulkQueueSessionRequest {
    bytes data = 1;
}

message BulkQueueSessionResponse {
    bool success = 1;
}




service QAService {
    rpc QueueSession(QueueSessionRequest) returns (QueueSessionResponse);
    rpc ReadTranscription(ReadTranscriptionRequest) returns (ReadTranscriptionResponse);
    rpc ReadSummary(ReadSummaryRequest) returns (ReadSummaryResponse);
    rpc ReadAllQa(ReadAllQaRequest) returns (ReadAllQaResponse);
    rpc ReadQARecord(ReadQARecordRequest) returns (ReadQARecordResponse);
    rpc BulkQueueSession(BulkQueueSessionRequest) returns (BulkQueueSessionResponse);
}
