syntax = "proto3";

package da.proto;
option go_package = "./pb";

message TicketLog {
    string id = 1;
    string description = 2;
    string ticket_id = 3;
    string actor_id = 4;
    string actor_name = 5;
    string actor_type = 6;
    string action_type = 7;
    string recipient_id = 8;
    string recipient_type = 9;
    string created_at = 10;
    string updated_at = 11;
}

message ReadTicketLogsRequest {
    string ticket_id = 1;
  }
  
message ReadTicketLogsResponse {
    repeated TicketLog ticket_logs = 1;
  }

service TicketLogService {
    rpc ReadTicketLogs(ReadTicketLogsRequest) returns(ReadTicketLogsResponse){}
}