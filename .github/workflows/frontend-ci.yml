name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "kylaFE/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "kylaFE/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: kylaFE

jobs:
  build:
    name: typecheck · lint · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: kylaFE/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: kylaFE/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm e2e:install

      - name: Run Playwright tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: kylaFE/playwright-report
          retention-days: 7
