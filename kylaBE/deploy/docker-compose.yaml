services:

  grpc-server:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile.dev
      target: development
    ports: 
      - "50050:50050"
    volumes:
      - ../:/app
      - /app/tmp
    env_file: 
      - ../envs/.env
    # depends_on:
    #   - database
    # links: 
    #   - db

  envoy-proxy: 
    image: envoyproxy/envoy:v1.25-latest # Envoy proxy image version 
    volumes: 
      - ../envoy.yaml:/etc/envoy/envoy.yaml # Mounting envoy.yaml file to the container 
    ports: 
      - "8000:8000"
      - "9903:9903"
    depends_on:
       - grpc-server
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml"]

  # NATS JetStream — event bus backbone
  # All domain events are published here. Automation engine, notification service,
  # analytics pipeline, and realtime gateway all consume from this stream.
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring / health
    volumes:
      - nats_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS monitoring UI (optional dev helper — http://localhost:8100)
  nats-surveyor:
    image: natsio/nats-surveyor:latest
    depends_on:
      - nats
    environment:
      - NATS_SURVEYOR_SERVERS=nats://nats:4222
      - NATS_SURVEYOR_HTTP_PORT=8100
    ports:
      - "8100:8100"
    restart: unless-stopped

  # Temporal — durable workflow execution engine.
  # Used by the automation engine for retries, timers, and workflow state persistence.
  # Backed by its own Postgres instance to isolate Temporal state from application data.
  temporal-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24
    depends_on:
      - temporal-postgres
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports:
      - "7233:7233"   # Temporal gRPC frontend
    restart: unless-stopped

  # Temporal Web UI — http://localhost:8088
  temporal-ui:
    image: temporalio/ui:2.26
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    restart: unless-stopped

  # ── Phase 5: Self-hosted SIP stack ─────────────────────────────────────────
  # FreeSWITCH is the PBX. We talk to it from Go via ESL (Event Socket Library)
  # on port 8021. Browser softphones connect via SIP-over-WSS on 7443 (handled
  # by mod_sofia / mod_verto). The container ships with a baseline config that
  # MUST be overridden in deploy/freeswitch/conf for production use — see
  # deploy/freeswitch/README.md for the expected mount layout.
  #
  # PSTN connectivity is provided via a SIP trunk configured at runtime via
  # the SipTrunkService gRPC — no static SIP trunk config baked into the image.
  freeswitch:
    image: signalwire/freeswitch:1.10
    ports:
      - "5060:5060/udp"     # SIP signalling (UDP)
      - "5060:5060/tcp"     # SIP signalling (TCP)
      - "5080:5080/udp"     # SIP external profile
      - "7443:7443/tcp"     # SIP-over-WSS for browser WebRTC
      - "8021:8021/tcp"     # ESL (Event Socket Library — Go control plane)
      - "16384-16484:16384-16484/udp"  # RTP media (bounded subrange for dev)
    volumes:
      # Mount kyla's config skeleton on top of the image's defaults.
      # See deploy/freeswitch/README.md for what each subdir provides.
      - ./freeswitch/conf/vars.xml:/etc/freeswitch/vars.xml:ro
      - ./freeswitch/conf/autoload_configs:/etc/freeswitch/autoload_configs:ro
      - ./freeswitch/conf/sip_profiles:/etc/freeswitch/sip_profiles:ro
      - ./freeswitch/conf/dialplan:/etc/freeswitch/dialplan:ro
      - freeswitch_recordings:/var/lib/freeswitch/recordings
    environment:
      # ESL password the Go telephony service uses to authenticate.
      # Override via env in non-dev environments.
      - FS_ESL_PASSWORD=${FS_ESL_PASSWORD:-ClueCon}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "fs_cli", "-x", "status"]
      interval: 15s
      timeout: 5s
      retries: 5

  # coturn provides STUN/TURN for WebRTC NAT traversal. Required for the
  # browser softphone to establish media flows when the agent is behind a
  # symmetric NAT (most enterprise networks).
  coturn:
    image: coturn/coturn:4.6
    ports:
      - "3478:3478/udp"     # STUN/TURN
      - "3478:3478/tcp"
      - "5349:5349/tcp"     # TURN over TLS
      - "49160-49200:49160-49200/udp"  # TURN relay range (bounded for dev)
    command: >-
      -n
      --no-cli
      --no-tls
      --realm=kyla
      --user=${TURN_USER:-kyla}:${TURN_PASSWORD:-kylaturn}
      --listening-port=3478
      --min-port=49160
      --max-port=49200
      --log-file=stdout
    restart: unless-stopped

  # database:
  #   image: postgres:alpine3.20
