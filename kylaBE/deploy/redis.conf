# Redis configuration for session management

# Network
bind 0.0.0.0
protected-mode yes
port 6379

# General
daemonize no
supervised no
loglevel notice

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Session specific settings
timeout 0
tcp-keepalive 300

# Security
requirepass ${REDIS_PASSWORD:-kyla_redis} 