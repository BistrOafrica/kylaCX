root = "."
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "coreServices"
  cmd = "go build -o ./tmp/coreServices cmd/server/main.go"
  include_ext = ["go", "proto"]
  exclude_dir = ["vendor", "tmp", "proc", "etc", "dev", "sys", "deploy"]
  exclude_file = ["*_test.go"]
  follow_symlink = true
  delay = 1000
  exclude_unchanged = false
  full_bin = ""
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[color]
  app = "cyan"
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true
  level = "debug"

[misc]
  clean_on_exit = true

[proxy]
  app_port = 50050
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = true
  keep_scroll = true
