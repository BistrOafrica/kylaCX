server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client routes go through index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gRPC-web proxy. The SPA points at /grpc (VITE_API_URL=/grpc) and this
    # block strips the prefix and forwards to envoy. HTTP/2 is kept inside
    # the cluster; envoy speaks gRPC-web to the browser and gRPC to backend.
    location /grpc/ {
        proxy_pass http://envoy:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # gRPC-web needs streaming + no buffering + long timeouts.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Health endpoint for upstream LBs.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
