# Minimal Redis config for the kyla stack. The password is supplied via
# --requirepass on the command line (see compose), not here, so the file
# stays in source control without leaking the secret.

bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Persistence — AOF gives durability for at-most-1-second-loss semantics,
# which is what backend rate-limit / session state assumes.
appendonly yes
appendfsync everysec
dir /data

# Memory caps left unset deliberately — set per environment via overrides.
