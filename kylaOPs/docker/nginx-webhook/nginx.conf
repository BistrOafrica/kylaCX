# Webhook ingress — isolated from the internal kyla network.
#
# Only the routes the backend exposes on its Gin HTTP server (port 8085) are
# proxied through. Everything else is rejected so a misconfigured webhook
# provider cannot probe internal endpoints.

server {
    listen 80;
    server_name _;

    # Webhook providers can POST large payloads (e.g. WhatsApp media events).
    client_max_body_size 25m;

    # Health for upstream LB.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # WhatsApp Business webhook (GET verify + POST receive).
    location = /webhooks/whatsapp {
        proxy_pass http://backend:8085/webhooks/whatsapp;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # SMS provider webhooks.
    location ~ ^/webhooks/sms/(twilio|africastalking)$ {
        proxy_pass http://backend:8085$request_uri;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # Authenticated tenant webhooks (Bearer token validated in-app).
    location /api/v1/webhooks {
        proxy_pass http://backend:8085;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    location / {
        return 404;
    }
}
